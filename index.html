<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
    <title>NKAP EXPRESS</title>
    <!-- On garde tes styles ici (ils sont parfaits) -->
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a0a;display:flex;justify-content:center;min-height:100vh;font-family:sans-serif;overflow:hidden}
        #NK{background:#0d0d0d;color:#e5e5e5;height:100vh;display:flex;flex-direction:column;position:relative;width:100%;max-width:480px;border:1px solid #1a1a1a}

        /* VERROU SERVEUR */
        #srv-lock{position:fixed;inset:0;background:#080808;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:2rem}
        .lock-logo{font-size:2rem;font-weight:700;color:#f0b90b;letter-spacing:3px}
        .cd-box{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:1.5rem 2.5rem;text-align:center}
        .cd-num{font-size:4rem;font-weight:700;color:#f0b90b}
        .pulse{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

        /* AUTH */
        #auth{position:fixed;inset:0;background:#0d0d0d;z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
        .pd{width:14px;height:14px;border-radius:50%;border:2px solid #2a2a2a;transition:0.2s}
        .pd.on{background:#f0b90b;border-color:#f0b90b}
        .ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .pb{background:#181818;border:1px solid #222;color:white;padding:15px;border-radius:10px;font-size:1.2rem}

        /* HEADER & CONTENT */
        #hdr{background:#0f0f0f;padding:10px 20px;display:flex;justify-content:space-between;border-bottom:1px solid #1a1a1a}
        .bal-val{color:#f0b90b;font-weight:bold}
        #content{flex:1;display:flex;flex-direction:column;padding:10px}
        .numgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
        .ngb{background:#111;border:1px solid #222;padding:20px;border-radius:10px;color:white;font-size:1.2rem}
        .ngb.sel{border-color:#f0b90b;background:#1a1500}
        
        /* NAV */
        #nav{background:#0f0f0f;border-top:1px solid #1a1a1a;display:flex;padding:10px}
        .nvb{flex:1;color:#555;text-align:center;font-size:0.7rem}
        .nvb.active{color:#f0b90b}
    </style>
</head>
<body>

<div id="NK">
    <!-- 1. ECRAN DE CHARGEMENT -->
    <div id="srv-lock">
        <div class="lock-logo">NKAP EXPRESS</div>
        <div class="cd-box">
            <div class="cd-num" id="lock-timer">--</div>
        </div>
        <div style="color:#555;font-size:0.7rem"><span class="pulse"></span> CONNEXION AU SERVEUR...</div>
    </div>

    <!-- 2. ECRAN PIN -->
    <div id="auth">
        <div style="color:#f0b90b;font-size:1.5rem;font-weight:bold">VÉRIFICATION</div>
        <div class="pdots">
            <div class="pd"></div><div class="pd"></div><div class="pd"></div><div class="pd"></div>
        </div>
        <div class="ppad">
            <button class="pb" onclick="addPin(1)">1</button><button class="pb" onclick="addPin(2)">2</button><button class="pb" onclick="addPin(3)">3</button>
            <button class="pb" onclick="addPin(4)">4</button><button class="pb" onclick="addPin(5)">5</button><button class="pb" onclick="addPin(6)">6</button>
            <button class="pb" onclick="addPin(7)">7</button><button class="pb" onclick="addPin(8)">8</button><button class="pb" onclick="addPin(9)">9</button>
            <button class="pb" style="color:red" onclick="clearPin()">✖</button><button class="pb" onclick="addPin(0)">0</button>
        </div>
        <div id="auth-err" style="color:red;font-size:0.8rem"></div>
    </div>

    <!-- 3. INTERFACE PRINCIPALE -->
    <div id="hdr">
        <div><div style="font-size:0.6rem;color:#444">SOLDE</div><div class="bal-val" id="user-solde">0 XAF</div></div>
        <div style="text-align:right"><div style="font-size:0.6rem;color:#444">TIMER</div><div id="main-timer" style="color:#f0b90b">--</div></div>
    </div>

    <div id="content">
        <div class="numgrid">
            <button class="ngb" onclick="selectN(0)">0</button><button class="ngb" onclick="selectN(1)">1</button><button class="ngb" onclick="selectN(2)">2</button>
            <button class="ngb" onclick="selectN(3)">3</button><button class="ngb" onclick="selectN(4)">4</button><button class="ngb" onclick="selectN(5)">5</button>
        </div>
        <input type="number" id="bet-amt" value="100" style="width:100%;padding:15px;background:#111;border:1px solid #333;color:white;border-radius:10px;margin-bottom:10px">
        <button onclick="placeBet()" style="width:100%;padding:15px;background:#f0b90b;border:none;border-radius:10px;font-weight:bold;color:black">PARIER (X5)</button>
    </div>

    <div id="nav">
        <div class="nvb active">JOUER</div>
        <div class="nvb">RETRAIT</div>
        <div class="nvb">INFOS</div>
    </div>
</div>

<script src="https://telegram.org"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // !!! METS TON URL NGROK ICI !!!
    const API_URL = "https://ngrok-free.dev"; 
    
    let pinBuffer = "";
    let selectedNum = null;
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 6657204005;

    // --- LOGIQUE SYNCHRO ---
    async function checkServer() {
        try {
            const res = await fetch(`${API_URL}/api/user_status?user_id=${userId}`);
            if(res.ok) {
                document.getElementById('srv-lock').style.display = 'none';
                if(pinBuffer.length < 4) document.getElementById('auth').style.display = 'flex';
            }
        } catch(e) { console.log("Recherche serveur..."); }
    }

    // --- LOGIQUE PIN ---
    function addPin(n) {
        if(pinBuffer.length < 4) {
            pinBuffer += n;
            const dots = document.querySelectorAll('.pd');
            dots.forEach((d, i) => d.classList.toggle('on', i < pinBuffer.length));
            if(pinBuffer.length === 4) submitPin();
        }
    }
    function clearPin() { pinBuffer = ""; document.querySelectorAll('.pd').forEach(d => d.classList.remove('on')); }

    async function submitPin() {
        try {
            const res = await fetch(`${API_URL}/api/gatekeeper`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: userId, pin: pinBuffer})
            });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('auth').style.display = 'none';
                startSync();
            } else {
                document.getElementById('auth-err').innerText = data.message;
                clearPin();
            }
        } catch(e) { document.getElementById('auth-err').innerText = "Erreur liaison"; }
    }

    function selectN(n) {
        selectedNum = n;
        document.querySelectorAll('.ngb').forEach(b => b.classList.remove('sel'));
        event.target.classList.add('sel');
    }

    async function placeBet() {
        const amt = document.getElementById('bet-amt').value;
        if(selectedNum === null) return alert("Choisis un numéro");
        const res = await fetch(`${API_URL}/api/place_bet`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user_id: userId, numero: selectedNum, mise: amt})
        });
        const data = await res.json();
        if(data.success) alert("Pari placé !");
    }

    function startSync() {
        setInterval(async () => {
            try {
                const res = await fetch(`${API_URL}/api/user_status?user_id=${userId}`);
                const data = await res.json();
                document.getElementById('user-solde').innerText = data.solde + " XAF";
                document.getElementById('main-timer').innerText = data.remaining_time;
                document.getElementById('lock-timer').innerText = data.remaining_time;
            } catch(e) {}
        }, 1000);
    }

    setInterval(checkServer, 2000);
</script>
</body>
</html>
